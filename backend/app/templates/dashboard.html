<!DOCTYPE html>
<html>
<head>
  <title>STS AlertHub Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 30px;
    }

    h1 { margin-bottom: 5px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .refresh-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 14px 18px;
      color: #cbd5e1;
      font-size: 14px;
      min-width: 230px;
    }

    .refresh-line {
      margin-bottom: 6px;
    }

    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #22c55e;
      margin-right: 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .card, .incident, .table-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 18px;
    }

    .label {
      color: #94a3b8;
      font-size: 14px;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
      margin-top: 8px;
    }

    .healthy { color: #22c55e; }
    .unhealthy { color: #ef4444; }
    .warning { color: #f59e0b; }
    .muted { color: #94a3b8; }

    .incident {
      margin-bottom: 14px;
    }

    .incident-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 8px;
    }

    .open {
      background: #7f1d1d;
      color: #fecaca;
    }

    .resolved {
      background: #14532d;
      color: #bbf7d0;
    }

    .status-healthy {
      background: #14532d;
      color: #bbf7d0;
    }

    .status-unhealthy {
      background: #7f1d1d;
      color: #fecaca;
    }

    .status-unknown {
      background: #713f12;
      color: #fde68a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #1f2937;
      font-size: 14px;
    }

    th {
      color: #94a3b8;
      font-weight: normal;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>STS AlertHub</h1>
      <div class="subtitle">Monitoring dashboard summary</div>
    </div>

    <div class="refresh-box">
      <div class="refresh-line">Last updated: <span id="last_updated">-</span></div>
      <div><span class="dot"></span>Auto refresh: ON (30s)</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">Total Websites</div>
      <div id="total_websites" class="value">-</div>
    </div>

    <div class="card">
      <div class="label">Healthy</div>
      <div id="healthy_websites" class="value healthy">-</div>
    </div>

    <div class="card">
      <div class="label">Unhealthy</div>
      <div id="unhealthy_websites" class="value unhealthy">-</div>
    </div>

    <div class="card">
      <div class="label">Open Incidents</div>
      <div id="open_incidents" class="value warning">-</div>
    </div>

    <div class="card">
      <div class="label">Total Downtime Minutes</div>
      <div id="total_downtime_minutes" class="value">-</div>
    </div>
  </div>

  <h2>Monitored Websites</h2>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>URL</th>
          <th>Status</th>
          <th>Payment</th>
          <th>Active</th>
          <th>Last Checked</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="websites_table">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <h2>Latest Incidents</h2>
  <div id="latest_incidents">Loading...</div>

  <script>
    function formatValue(value) {
      return value === null || value === undefined ? 'Still open' : value;
    }

    function statusBadge(status) {
      const cleanStatus = status || 'unknown';
      let badgeClass = 'status-unknown';

      if (cleanStatus === 'healthy') {
        badgeClass = 'status-healthy';
      }

      if (cleanStatus === 'unhealthy') {
        badgeClass = 'status-unhealthy';
      }

      return `<span class="badge ${badgeClass}">${cleanStatus.toUpperCase()}</span>`;
    }

    function renderWebsites(websites) {
      if (!websites.length) {
        return '<tr><td colspan="6">No websites added yet.</td></tr>';
      }

      return websites.map((website) => {
        return `
          <tr>
            <td><strong>${website.name}</strong></td>
            <td><a href="${website.url}" target="_blank">${website.url}</a></td>
            <td>${statusBadge(website.last_status)}</td>
            <td>${website.payment_status}</td>
            <td>${website.is_active ? 'Yes' : 'No'}</td>
            <td class="muted">${website.last_checked_at || 'Never'}</td>
            <td>
              <button onclick="checkNow()">Check Now</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderIncidents(incidents) {
      if (!incidents.length) {
        return '<div class="incident">No incidents recorded yet.</div>';
      }

      return incidents.map((incident) => {
        const badgeClass = incident.status === 'open' ? 'open' : 'resolved';

        return `
          <div class="incident">
            <div class="incident-title">
              Incident #${incident.id}
              <span class="badge ${badgeClass}">${incident.status.toUpperCase()}</span>
            </div>
            <div class="meta">
              <div><strong>Website ID:</strong> ${incident.website_id}</div>
              <div><strong>Started:</strong> ${incident.started_at}</div>
              <div><strong>Resolved:</strong> ${formatValue(incident.resolved_at)}</div>
              <div><strong>Duration:</strong> ${formatValue(incident.duration_minutes)} minutes</div>
              <div><strong>Reason:</strong> ${incident.reason}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function checkNow() {
      await fetch('/monitors/run-all', {
        method: 'POST'
      });

      await loadDashboard();
    }

    async function loadDashboard() {
      const dashboardResponse = await fetch('/dashboard/summary');
      const dashboardData = await dashboardResponse.json();

      const websitesResponse = await fetch('/websites');
      const websitesData = await websitesResponse.json();

      document.getElementById('total_websites').textContent = dashboardData.total_websites;
      document.getElementById('healthy_websites').textContent = dashboardData.healthy_websites;
      document.getElementById('unhealthy_websites').textContent = dashboardData.unhealthy_websites;
      document.getElementById('open_incidents').textContent = dashboardData.incident_summary.open_incidents;
      document.getElementById('total_downtime_minutes').textContent = dashboardData.incident_summary.total_downtime_minutes;

      document.getElementById('websites_table').innerHTML =
        renderWebsites(websitesData.websites);

      document.getElementById('latest_incidents').innerHTML =
        renderIncidents(dashboardData.latest_incidents);

      document.getElementById('last_updated').textContent =
        new Date().toLocaleString();
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
