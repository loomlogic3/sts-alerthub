<!DOCTYPE html>
<html>
<head>
  <title>Website Detail - STS AlertHub</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.16);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.12), transparent 32%),
        var(--bg);
      color: var(--text);
      margin: 0;
      padding: 32px;
      min-height: 100vh;
    }

    .shell {
      max-width: 1300px;
      margin: 0 auto;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #93c5fd;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: -0.04em;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .card, .table-card, .incident {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    .healthy { color: var(--green); }
    .unhealthy { color: var(--red); }
    .warning { color: var(--amber); }
    .muted { color: var(--muted); }

    button {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { filter: brightness(1.1); }

    .user-line {
      color: #93c5fd;
      margin: 8px 0 14px;
      font-size: 13px;
    }

    .secondary-button {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th, td {
      text-align: left;
      padding: 13px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
    }

    tr:hover td {
      background: rgba(30, 41, 59, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.04em;
    }

    .status-healthy, .resolved {
      background: rgba(20, 83, 45, 0.75);
      color: #bbf7d0;
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .status-unhealthy, .open {
      background: rgba(127, 29, 29, 0.75);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    .incident {
      border-left: 4px solid var(--blue);
    }

    .incident.open-border {
      border-left-color: var(--red);
    }

    .incident.resolved-border {
      border-left-color: var(--green);
    }

    .incident-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .incident-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .field {
      background: rgba(2, 6, 23, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.10);
      border-radius: 12px;
      padding: 12px;
    }

    .field-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .field-value {
      word-break: break-word;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <a href="/dashboard" class="back">← Back to dashboard</a>
    <div class="user-line">Logged in as: <span id="logged_in_user">-</span></div>
    <button class="secondary-button" onclick="logout()" style="margin-bottom: 22px;">Logout</button>

    <h1 id="website_name">Website Detail</h1>
    <div id="website_url" class="subtitle"></div>

    <div class="grid">
      <div class="card">
        <div class="label">Current Status</div>
        <div id="current_status" class="value">-</div>
      </div>

      <div class="card">
        <div class="label">Uptime</div>
        <div id="uptime_percentage" class="value">-</div>
      </div>

      <div class="card">
        <div class="label">Average Response</div>
        <div id="avg_response" class="value">-</div>
      </div>

      <div class="card">
        <div class="label">Open Incidents</div>
        <div id="open_incidents" class="value warning">-</div>
      </div>
    </div>

    <div class="card">
      <button onclick="checkNow()">Check Now</button>
    </div>

    <div class="table-card">
      <h2>Recent Uptime Checks</h2>
      <table>
        <thead>
          <tr>
            <th>Checked At</th>
            <th>Status</th>
            <th>Status Code</th>
            <th>Response Time</th>
          </tr>
        </thead>
        <tbody id="uptime_checks">
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <h2>Recent Incidents</h2>
    <div id="incidents">Loading...</div>
  </div>

  <script>

    function requireLogin() {
      const isLoggedIn = localStorage.getItem('alerthub_logged_in');

      if (isLoggedIn !== 'true') {
        window.location.href = '/login';
      }
    }

    const pathParts = window.location.pathname.split('/');
    const websiteId = pathParts[2];


    function cleanReason(reason) {
      const text = String(reason || 'Website unreachable');

      if (text.toLowerCase().includes('failed to resolve')) {
        return 'DNS resolution failed';
      }

      if (text.toLowerCase().includes('connection refused')) {
        return 'Connection refused';
      }

      if (text.toLowerCase().includes('timeout')) {
        return 'Connection timeout';
      }

      if (text.toLowerCase().includes('ssl') || text.toLowerCase().includes('certificate')) {
        return 'SSL/certificate error';
      }

      if (text.length > 80) {
        return 'Website unreachable';
      }

      return text;
    }

    function formatValue(value) {
      return value === null || value === undefined ? 'Still open' : value;
    }

    function statusClass(status) {
      if (status === 'healthy') return 'healthy';
      if (status === 'unhealthy') return 'unhealthy';
      return 'warning';
    }

    function statusBadge(status) {
      const cleanStatus = status || 'unknown';
      const badgeClass = cleanStatus === 'healthy'
        ? 'status-healthy'
        : 'status-unhealthy';

      return `<span class="badge ${badgeClass}">${cleanStatus.toUpperCase()}</span>`;
    }

    function renderUptimeChecks(checks) {
      if (!checks.length) {
        return '<tr><td colspan="4">No uptime checks yet.</td></tr>';
      }

      return checks.slice(0, 10).map((check) => {
        return `
          <tr>
            <td>${check.checked_at}</td>
            <td>${statusBadge(check.status)}</td>
            <td>${formatValue(check.status_code)}</td>
            <td>${formatValue(check.response_time_ms)} ms</td>
          </tr>
        `;
      }).join('');
    }

    function renderIncidents(incidents) {
      if (!incidents.length) {
        return '<div class="incident">No incidents recorded yet.</div>';
      }

      return incidents.slice(0, 10).map((incident) => {
        const badgeClass = incident.status === 'open' ? 'open' : 'resolved';
        const borderClass = incident.status === 'open'
          ? 'open-border'
          : 'resolved-border';

        return `
          <div class="incident ${borderClass}">
            <div class="incident-title">
              Incident #${incident.id}
              <span class="badge ${badgeClass}">${incident.status.toUpperCase()}</span>
            </div>
            <div class="muted">${cleanReason(incident.reason)}</div>

            <div class="incident-grid">
              <div class="field">
                <div class="field-label">Started</div>
                <div class="field-value">${incident.started_at}</div>
              </div>

              <div class="field">
                <div class="field-label">Resolved</div>
                <div class="field-value">${formatValue(incident.resolved_at)}</div>
              </div>

              <div class="field">
                <div class="field-label">Duration</div>
                <div class="field-value">${formatValue(incident.duration_minutes)} minutes</div>
              </div>

              <div class="field">
                <div class="field-label">Reason</div>
                <div class="field-value">${cleanReason(incident.reason)}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function logout() {
      localStorage.removeItem('alerthub_logged_in');
      localStorage.removeItem('alerthub_user_email');
      window.location.href = '/login';
    }

    async function checkNow() {
      await fetch('/monitors/run-all', { method: 'POST' });
      await loadDetail();
    }

    async function loadDetail() {
      const websitesResponse = await fetch('/websites');
      const websitesData = await websitesResponse.json();

      const website = websitesData.websites.find(
        (item) => String(item.id) === String(websiteId)
      );

      if (!website) {
        document.getElementById('website_name').textContent = 'Website not found';
        return;
      }

      const uptimeSummaryResponse = await fetch(`/websites/${websiteId}/uptime-summary`);
      const uptimeSummary = await uptimeSummaryResponse.json();

      const incidentsSummaryResponse = await fetch(`/websites/${websiteId}/incidents/summary`);
      const incidentsSummary = await incidentsSummaryResponse.json();

      const uptimeResponse = await fetch(`/websites/${websiteId}/uptime`);
      const uptimeData = await uptimeResponse.json();

      const incidentsResponse = await fetch(`/websites/${websiteId}/incidents`);
      const incidentsData = await incidentsResponse.json();

      document.getElementById('website_name').textContent = website.name;
      document.getElementById('website_url').innerHTML =
        `<a href="${website.url}" target="_blank">${website.url}</a>`;

      const currentStatus = document.getElementById('current_status');
      currentStatus.textContent = website.last_status || 'unknown';
      currentStatus.className = `value ${statusClass(website.last_status)}`;

      document.getElementById('uptime_percentage').textContent =
        `${uptimeSummary.uptime_percentage}%`;

      document.getElementById('avg_response').textContent =
        uptimeSummary.average_response_time_ms === null
          ? '-'
          : `${uptimeSummary.average_response_time_ms} ms`;

      document.getElementById('open_incidents').textContent =
        incidentsSummary.open_incidents;

      document.getElementById('uptime_checks').innerHTML =
        renderUptimeChecks(uptimeData.uptime);

      document.getElementById('incidents').innerHTML =
        renderIncidents(incidentsData.incidents);

      document.getElementById('logged_in_user').textContent =
        localStorage.getItem('alerthub_user_email') || 'Unknown user';
    }

    requireLogin();
    loadDetail();
    setInterval(loadDetail, 30000);
  </script>
</body>
</html>
