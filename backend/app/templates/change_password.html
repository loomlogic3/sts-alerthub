<!DOCTYPE html>
<html>
<head>
  <title>Change Password - STS AlertHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 32%),
        #020617;
      color: #e5e7eb;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }

    h1 {
      margin: 14px 0 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #020617;
      color: #e5e7eb;
      margin-bottom: 16px;
      font-size: 15px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .message {
      margin-top: 16px;
      color: #fca5a5;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="/dashboard">← Back to dashboard</a>
    <h1>Change Password</h1>
    <div class="subtitle">Update your AlertHub admin password</div>

    <form id="password_form">
      <label>Email</label>
      <input id="email" type="email" required>

      <label>Current Password</label>
      <input id="current_password" type="password" required>

      <label>New Password</label>
      <input id="new_password" type="password" required>

      <button type="submit">Change Password</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    emailInput.value = localStorage.getItem('alerthub_user_email') || '';

    document.getElementById('password_form').addEventListener('submit', async (event) => {
      event.preventDefault();

      const message = document.getElementById('message');
      message.style.color = '#fca5a5';
      message.textContent = 'Updating password...';

      const response = await fetch('/auth/change-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('email').value,
          current_password: document.getElementById('current_password').value,
          new_password: document.getElementById('new_password').value
        })
      });

      const data = await response.json();

      if (!response.ok || !data.password_changed) {
        message.textContent = data.detail || 'Password change failed';
        return;
      }

      message.style.color = '#86efac';
      message.textContent = 'Password changed successfully.';
    });
  </script>
</body>
</html>
