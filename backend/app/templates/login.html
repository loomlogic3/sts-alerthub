<!DOCTYPE html>
<html>
<head>
  <title>Login - STS AlertHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 32%),
        #020617;
      color: #e5e7eb;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin: 0 0 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #020617;
      color: #e5e7eb;
      margin-bottom: 16px;
      font-size: 15px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .message {
      margin-top: 16px;
      color: #fca5a5;
      font-size: 14px;
      min-height: 20px;
    }

    .brand {
      display: inline-block;
      margin-bottom: 12px;
      color: #bfdbfe;
      background: rgba(37, 99, 235, 0.18);
      border: 1px solid rgba(96, 165, 250, 0.24);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">SynthThinkingSystems • AlertHub</div>
    <h1>Login</h1>
    <div class="subtitle">Access your monitoring dashboard</div>

    <form id="login_form">
      <label>Email</label>
      <input id="email" type="email" required placeholder="admin@sts.local">

      <label>Password</label>
      <input id="password" type="password" required placeholder="Enter password">

      <button type="submit">Login</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('login_form');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      message.textContent = 'Checking credentials...';

      const response = await fetch('/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });

      const data = await response.json();

      if (!response.ok) {
        message.textContent = data.detail || 'Login failed';
        return;
      }

      localStorage.setItem('alerthub_logged_in', 'true');
      localStorage.setItem('alerthub_access_token', data.access_token);
      localStorage.setItem('alerthub_user_email', data.user.email);
      localStorage.setItem('alerthub_user_role', data.user.role);
      localStorage.setItem(
        'alerthub_permissions',
        JSON.stringify(data.user.permissions || [])
      );

      message.style.color = '#86efac';
      message.textContent = 'Login successful. Redirecting...';

      setTimeout(() => {
        window.location.href = '/dashboard';
      }, 700);
    });
  </script>
</body>
</html>
