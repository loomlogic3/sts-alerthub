<!DOCTYPE html>
<html>
<head>
    <title>Users - STS AlertHub</title>

    <style>
        body{
            background:#020617;
            color:#e5e7eb;
            font-family:Arial,sans-serif;
            margin:0;
        }

        .container{
            width:1100px;
            margin:40px auto;
        }

        h1{
            margin-bottom:10px;
        }

        .subtitle{
            color:#94a3b8;
            margin-bottom:30px;
        }

        .card{
            background:#111827;
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px;
            padding:20px;
            margin-bottom:24px;
        }

        .form-panel{
            max-width:640px;
        }

        input,select{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:1px solid rgba(148,163,184,.25);
            background:#020617;
            color:#e5e7eb;
            margin-bottom:14px;
        }

        button{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            border:none;
            border-radius:10px;
            padding:10px 14px;
            font-weight:bold;
            cursor:pointer;
        }

        .message{
            margin-top:12px;
            color:#86efac;
        }

        .password-wrap{
            display:flex;
            align-items:center;
            gap:8px;
        }

        .password-wrap input{
            margin-bottom:0;
        }

        .eye-button{
            background:#334155;
            min-width:46px;
            padding:11px 12px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#111827;
            border-radius:14px;
            overflow:hidden;
        }

        th,td{
            padding:16px;
            border-bottom:1px solid rgba(255,255,255,.08);
            text-align:left;
        }

        th{
            color:#94a3b8;
            font-size:13px;
            text-transform:uppercase;
        }

        a{
            color:#93c5fd;
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<a href="/dashboard">← Back to dashboard</a>

<h1>User Management</h1>

<p class="subtitle">
Registered AlertHub users
</p>

<div class="card">
<h2 id="form_title">Create User</h2>

<div class="form-panel">

<label>Email</label>
<input id="email" type="email" placeholder="newuser@sts.local">

<input id="edit_mode" type="hidden" value="false">

<label>Role</label>
<select id="role">
<option value="viewer">viewer</option>
<option value="operator">operator</option>
<option value="admin">admin</option>
</select>

<label>Password</label>
<div class="password-wrap">
<input id="password" type="password" placeholder="Temporary password">
<button type="button" class="eye-button" onclick="togglePassword()">👁</button>
</div>

<button id="save_button" onclick="saveUser()">Create User</button>
<button onclick="resetForm()" style="background:#334155;">Clear</button>

<div id="message" class="message"></div>

</div>
</div>

<table>

<thead>

<tr>

<th>Email</th>

<th>Role</th>

<th>Active</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="users_table">

<tr>

<td colspan="4">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script>

function togglePassword(){
const passwordInput=document.getElementById("password");
passwordInput.type=passwordInput.type==="password" ? "text" : "password";
}

function resetForm(){
document.getElementById("form_title").textContent="Create User";
document.getElementById("save_button").textContent="Create User";
document.getElementById("email").value="";
document.getElementById("email").readOnly=false;
document.getElementById("password").value="";
document.getElementById("password").placeholder="Temporary password";
document.getElementById("role").value="viewer";
document.getElementById("edit_mode").value="false";
document.getElementById("message").textContent="";
}

function editUser(email, role, isActive){
document.getElementById("form_title").textContent="Edit User";
document.getElementById("save_button").textContent="Save Changes";
document.getElementById("email").value=email;
document.getElementById("email").readOnly=true;
document.getElementById("password").value="";
document.getElementById("password").placeholder="Leave blank when editing";
document.getElementById("role").value=role;
document.getElementById("edit_mode").value="true";
window.scrollTo({top:0,behavior:"smooth"});
}

async function saveUser(){

const isEditMode=document.getElementById("edit_mode").value==="true";

if(isEditMode){
await updateUser();
return;
}

await createUser();

}

async function updateUser(){

const message=document.getElementById("message");
message.style.color="#86efac";
message.textContent="Updating user...";

const email=document.getElementById("email").value;

const response=await fetch(`/users/${email}`,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
role:document.getElementById("role").value,
is_active:true
})
});

const data=await response.json();

if(!response.ok || !data.user_updated){
message.style.color="#fca5a5";
message.textContent=data.detail || "User update failed";
return;
}

message.textContent="User updated.";
resetForm();
await loadUsers();

}

async function createUser(){

const message=document.getElementById("message");
message.style.color="#86efac";
message.textContent="Creating user...";

const response=await fetch("/users",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:document.getElementById("email").value,
password:document.getElementById("password").value,
role:document.getElementById("role").value
})
});

const data=await response.json();

if(!response.ok){
message.style.color="#fca5a5";
message.textContent=data.detail || "User creation failed";
return;
}

message.textContent="User created.";

document.getElementById("email").value="";
document.getElementById("password").value="";
document.getElementById("role").value="viewer";

await loadUsers();

}

async function loadUsers(){

const response=await fetch("/users/list");

const data=await response.json();

document.getElementById("users_table").innerHTML=data.users.map(user=>`

<tr>

<td>${user.email}</td>

<td>${user.role}</td>

<td>${user.is_active?"Yes":"No"}</td>

<td>
<button onclick="editUser('${user.email}', '${user.role}', ${user.is_active})">Edit</button>
</td>

</tr>

`).join("");

}

loadUsers();

</script>

</body>

</html>
